<!-- EmailJS SDK -->
<script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<!-- Your JavaScript -->
<script>
    // =========================================================================
    // CONFIGURATION
    // =========================================================================
    const CONFIG = {
        emailJS: {
            serviceId: "service_i62n0vq",
            templateId: "template_wmznpsj",
            publicKey: "ctanCThOR0TUbRkv-"
        },
        githubPagesImageBase: "https://rgcomins.github.io/static"
    };

    // Room image mapping - mirrors the Python ROOMS dictionary
    const ROOM_IMAGES = {
        "Deluxe Ocean Front": "deluxe.png",
        "Ilima Ocean West": "ilima.png",
        "Ocean View": "ocean-view-room.png",
        "Partial Ocean View": "partial-ocean-view-room.png",
        "Resort View": "resort-view.png"
    };

    // =========================================================================
    // CURRENCY FORMATTER
    // =========================================================================
    const currencyFormatter = new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });

    function formatCurrency(value) {
        return currencyFormatter.format(value);
    }

    // Format number to 2 decimal places without currency symbol, with commas
    function formatNumber(value) {
        return Number(value).toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    // =========================================================================
    // HELPER FUNCTIONS
    // =========================================================================

    function getRoomImageUrl(roomType) {
        const imageName = ROOM_IMAGES[roomType] || "halekoa_Hotel.webp";

        if (CONFIG.githubPagesImageBase) {
            return `${CONFIG.githubPagesImageBase}/${imageName}`;
        } else {
            return `${window.location.origin}/static/${imageName}`;
        }
    }

    function parseRoomData(roomValue) {
        const [roomType, costStr] = roomValue.split("|");
        return {
            roomType: roomType,
            roomCost: Number(parseFloat(costStr).toFixed(2))
        };
    }

    function calculateDateRange(startDateStr, nights) {
        const startDate = new Date(startDateStr);
        const endDate = new Date(startDate.getTime() + nights * 24 * 60 * 60 * 1000);
        const endDateStr = endDate.toISOString().split('T')[0];
        return `${startDateStr} to ${endDateStr}`;
    }

    function getSelectedActivities() {
        const checkedActivities = document.querySelectorAll('input[name="activity"]:checked');
        const names = [];
        let totalCost = 0;

        checkedActivities.forEach(checkbox => {
            const [name, costStr] = checkbox.value.split("|");
            names.push(name);
            totalCost += parseInt(costStr, 10);
        });

        return {
            names: names.length > 0 ? names.join(", ") : "None",
            cost: totalCost
        };
    }

    function calculateTotals(roomCost, nights, ticketPrice, activityCost) {
        const costOfStay = Number((nights * roomCost).toFixed(2));
        const subTotal = Number((costOfStay + ticketPrice + activityCost).toFixed(2));
        const taxRate = 0.1025;
        const tax = Number((subTotal * taxRate).toFixed(2));
        const total = Number((subTotal + tax).toFixed(2));

        return {
            costOfStay: costOfStay,
            subTotal: subTotal,
            tax: tax,
            total: total
        };
    }

    function gatherFormData() {
        // Room data
        const roomData = parseRoomData(document.getElementById("Rooms").value);
        const roomImageUrl = getRoomImageUrl(roomData.roomType);

        // Dates
        const startDate = document.getElementById("dates").value;
        const nights = parseInt(document.getElementById("num_nights").value, 10);
        const dateRange = calculateDateRange(startDate, nights);

        // Tickets
        const ticketPrice = Number(document.getElementById("ticketPrice").value);

        // Activities
        const activities = getSelectedActivities();

        // Totals
        const totals = calculateTotals(roomData.roomCost, nights, ticketPrice, activities.cost);

        // Assemble email data with fully formatted currency values (includes $ and commas)
        return {
            to_email: document.getElementById("userEmail").value,
            name: document.getElementById("name").value,
            dates: dateRange,
            ticketPrice: formatCurrency(ticketPrice),
            roomType: roomData.roomType,
            roomCost: formatCurrency(roomData.roomCost),
            roomImageUrl: roomImageUrl,
            nights: nights,
            comments: document.getElementById("comments").value,
            costOfStay: formatCurrency(totals.costOfStay),
            tax: formatCurrency(totals.tax),
            totalCostOfStay: formatCurrency(totals.total),
            aname: activities.names,
            acost: formatCurrency(activities.cost),
            subTotal: formatCurrency(totals.subTotal)
        };
    }

    function initializeEmailJS() {
        console.log("Initializing EmailJS…");
        emailjs.init(CONFIG.emailJS.publicKey);
    }

    function sendEmail(data) {
        console.log("EmailJS data:", data);

        return emailjs.send(CONFIG.emailJS.serviceId, CONFIG.emailJS.templateId, data);
    }

    // =========================================================================
    // EVENT LISTENERS
    // =========================================================================

    initializeEmailJS();

    const form = document.getElementById("Tripform");

    form.addEventListener("submit", function(event) {
        event.preventDefault();

        try {
            const data = gatherFormData();
            sendEmail(data)
                .then(response => {
                    console.log("Email sent successfully!", response);
                    form.submit();
                })
                .catch(error => {
                    console.log("Email send failed, submitting form anyway", error);
                    form.submit();
                });
        } catch (error) {
            console.error("Error processing form:", error);
            form.submit();
        }
    });
</script>


</body>
