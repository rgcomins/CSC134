{% extends "base.html" %}
{% block title %}Honolulu Hotels — Find your stay{% endblock %}

{% block body %}
<section class="hero">
    <div class="hero-image" style="background-image: url('{{ url_for('static', filename='rainbow_map.jpg') }}');"></div>
    <div class="hero-scrim"></div>
    <div class="hero-content container">
        <p class="caption" style="color: var(--paper); opacity: 0.85; margin-bottom: 12px;">Honolulu · Hawaii</p>
        <h1 class="display-xl">Find your stay in Honolulu.</h1>
        <p>Five iconic Waikiki hotels, one quiet booking experience. Pick a property, plan the trip, see the cost.</p>
        <div style="margin-top: 32px;">
            <a class="btn btn-primary" href="{{ url_for('hotels_menu') }}">Browse hotels &rarr;</a>
        </div>
    </div>
</section>
{% endblock %}
